<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #1a1a2e; color: white; }
        iframe { width: 100%; height: 100vh; border: none; }
        .nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: #2a2a4e; padding: 10px;
            display: flex; justify-content: space-around;
            z-index: 999;
        }
        .nav button {
            background: #4CAF50; color: white;
            border: none; padding: 8px 12px;
            border-radius: 8px; font-size: 12px;
            cursor: pointer;
        }
        .nav button:hover { background: #45a049; }
        .screen { display: none; width: 100%; height: calc(100vh - 60px); overflow-y: auto; }
        .screen.active { display: block; }
    </style>
</head>
<body>

<!-- ALL SCREENS -->
<div id="onboarding" class="screen active">
    <iframe src="onboarding_locked_state/code.html"></iframe>
</div>

<div id="dashboard" class="screen">
    <iframe src="dashboard_unlocked/code.html"></iframe>
</div>

<div id="lessons" class="screen">
    <iframe src="lesson_view/code.html"></iframe>
</div>

<div id="writing" class="screen">
    <iframe src="ai_writing_evaluation/code.html"></iframe>
</div>

<div id="speaking" class="screen">
    <iframe src="speaking_practice/code.html"></iframe>
</div>

<div id="homework" class="screen">
    <iframe src="homework_module/code.html"></iframe>
</div>

<div id="progress" class="screen">
    <iframe src="progress_gamification/code.html"></iframe>
</div>

<div id="payment" class="screen">
    <iframe src="payment_enrollment/code.html"></iframe>
</div>

<!-- BOTTOM NAVIGATION -->
<div class="nav">
    <button onclick="showScreen('dashboard')">🏠 Home</button>
    <button onclick="showScreen('lessons')">📖 Lessons</button>
    <button onclick="showScreen('writing')">✍️ Writing</button>
    <button onclick="showScreen('speaking')">🎤 Speaking</button>
    <button onclick="showScreen('progress')">📈 Progress</button>
</div>

<script>
    window.Telegram.WebApp.ready();
    window.Telegram.WebApp.expand();

    function showScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => {
            s.classList.remove('active');
        });
        document.getElementById(screenId).classList.add('active');
    }

    // Start on onboarding
    showScreen('onboarding');
</script>

</body>
</html>
